<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
	<title id="title">Redis 热 key 发现与处理</title>
	<desc id="desc">手绘风格流程图，展示热 key 从发现到本地缓存、副本分散、读写分离和集群扩展的治理路径。</desc>
	<defs>
		<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="#191713" />
		</marker>
		<filter id="rough">
			<feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="noise" />
			<feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4" />
		</filter>
		<style>
			.bg { fill: #fbf6e8; }
			.paper { fill: none; stroke: #e9dec8; stroke-width: 1; opacity: .5; }
			.line { fill: none; stroke: #191713; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; filter: url(#rough); }
			.thin { fill: none; stroke: #191713; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; filter: url(#rough); }
			.faint { fill: none; stroke: #cdbf9b; stroke-width: 1.4; opacity: .38; stroke-linecap: round; }
			.node { fill: #fffdf5; stroke: #191713; stroke-width: 3; filter: url(#rough); }
			.hot { fill: #ffe7a6; stroke: #191713; stroke-width: 3; filter: url(#rough); }
			.text { font-family: "Kaiti SC", "STKaiti", "Songti SC", serif; fill: #191713; font-size: 28px; font-weight: 700; }
			.small { font-family: "Kaiti SC", "STKaiti", "Songti SC", serif; fill: #191713; font-size: 20px; }
			.caption { font-family: "Kaiti SC", "STKaiti", "Songti SC", serif; fill: #4b4031; font-size: 24px; }
		</style>
	</defs>
	<rect class="bg" width="1200" height="675" />
	<path class="paper" d="M60 80 C210 35 365 118 520 76 S850 38 1100 86" />
	<path class="paper" d="M90 560 C260 610 395 515 565 568 S890 620 1120 548" />
	<path class="faint" d="M112 140 h112 v44 h80" />
	<path class="faint" d="M885 126 h72 v38 h118" />
	<path class="faint" d="M145 488 h110 v-36 h80" />
	<path class="faint" d="M835 510 h105 v-48 h94" />
	<circle cx="112" cy="140" r="5" fill="#d9c99f" opacity=".55" />
	<circle cx="1075" cy="164" r="5" fill="#d9c99f" opacity=".55" />
	<circle cx="1034" cy="462" r="5" fill="#d9c99f" opacity=".55" />

	<text x="86" y="82" class="text">热 key 治理路径</text>
	<text x="86" y="118" class="small">先识别集中访问，再把读压力拆散</text>

	<g transform="translate(70 210)">
		<rect class="node" x="0" y="0" width="150" height="120" rx="18" />
		<path class="thin" d="M34 70 c30 -55 56 -55 86 0" />
		<path class="thin" d="M44 72 h66" />
		<path class="thin" d="M62 42 l-12 -18 M84 38 v-22 M105 43 l14 -17" />
		<text class="text" x="75" y="100" text-anchor="middle">请求洪峰</text>
	</g>

	<path class="line" marker-end="url(#arrow)" d="M235 270 C270 250 292 250 330 270" />

	<g transform="translate(340 210)">
		<rect class="node" x="0" y="0" width="155" height="120" rx="18" />
		<circle class="thin" cx="62" cy="52" r="26" />
		<path class="thin" d="M82 72 l34 28" />
		<path class="thin" d="M48 52 h30 M63 37 v30" />
		<text class="text" x="78" y="101" text-anchor="middle">热点识别</text>
	</g>

	<path class="line" marker-end="url(#arrow)" d="M510 270 C547 246 580 246 617 270" />

	<g transform="translate(630 185)">
		<rect class="hot" x="0" y="0" width="170" height="170" rx="22" />
		<rect class="thin" x="42" y="35" width="86" height="56" rx="10" />
		<path class="thin" d="M52 108 h66 M58 124 h54" />
		<path class="thin" d="M38 35 c-10 10 -14 24 -12 40 M134 36 c10 12 13 28 9 43" />
		<text class="text" x="85" y="148" text-anchor="middle">本地缓存</text>
	</g>

	<path class="line" marker-end="url(#arrow)" d="M815 270 C850 250 882 250 918 270" />

	<g transform="translate(930 210)">
		<rect class="hot" x="0" y="0" width="185" height="120" rx="18" />
		<circle class="thin" cx="49" cy="48" r="18" />
		<circle class="thin" cx="93" cy="48" r="18" />
		<circle class="thin" cx="137" cy="48" r="18" />
		<path class="thin" d="M49 66 v18 M93 66 v18 M137 66 v18" />
		<text class="text" x="92" y="101" text-anchor="middle">副本分散</text>
	</g>

	<path class="line" marker-end="url(#arrow)" d="M1010 340 C994 390 898 405 797 405" />

	<g transform="translate(615 385)">
		<rect class="node" x="0" y="0" width="180" height="120" rx="18" />
		<path class="thin" d="M52 34 h76 v28 H52z" />
		<path class="thin" d="M90 62 v30" />
		<path class="thin" d="M52 92 h76" />
		<path class="thin" d="M66 92 v18 M114 92 v18" />
		<text class="text" x="90" y="106" text-anchor="middle">读写分离</text>
	</g>

	<path class="line" marker-end="url(#arrow)" d="M602 445 C558 466 520 466 478 445" />

	<g transform="translate(280 385)">
		<rect class="node" x="0" y="0" width="190" height="120" rx="18" />
		<rect class="thin" x="36" y="34" width="42" height="36" rx="8" />
		<rect class="thin" x="98" y="34" width="42" height="36" rx="8" />
		<rect class="thin" x="67" y="76" width="42" height="30" rx="8" />
		<path class="thin" d="M78 52 h20 M88 70 v6" />
		<text class="text" x="95" y="106" text-anchor="middle">集群扩展</text>
	</g>

	<path class="line" marker-end="url(#arrow)" d="M268 445 C220 433 176 400 150 345" />

	<text x="350" y="598" class="caption">热 key 的核心不是“更快读取”，而是让压力不要落在一个点上。</text>
</svg>
