<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL BRIN index implementation</title>
  <desc id="desc">A BRIN index stores summaries for ranges of heap pages. Queries use summaries to skip unrelated ranges and recheck matching ranges.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4a5a"/></marker>
    <style>
      .bg { fill: #f8faf9; }
      .box { fill: #ffffff; stroke: #b8c6c9; stroke-width: 2; rx: 10; }
      .range { fill: #eef6f2; stroke: #78908d; stroke-width: 2; rx: 8; }
      .hit { fill: #fff7e6; stroke: #b88a38; stroke-width: 2; rx: 8; }
      .skip { fill: #f3f3f3; stroke: #a9a9a9; stroke-width: 2; rx: 8; }
      .heap { fill: #eef2ff; stroke: #6875b4; stroke-width: 2; rx: 8; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; fill: #1d2b34; font-weight: 700; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #26363d; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #3b4c54; }
      .arrow { stroke: #2f4a5a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6d7f86; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1120" height="660"/>
  <text class="label" x="40" y="48">BRIN：Block Range 摘要索引</text>
  <text class="text" x="40" y="78">不逐行索引，而是为一段连续 heap blocks 保存 min/max 等摘要，适合超大、按时间追加的表。</text>
  <rect class="box" x="40" y="112" width="1040" height="470"/>

  <rect class="range" x="90" y="158" width="220" height="84"/>
  <text class="label" x="134" y="190">Range 1</text>
  <text class="small" x="126" y="216">2026-01-01 ~ 01-02</text>
  <rect class="range" x="350" y="158" width="220" height="84"/>
  <text class="label" x="394" y="190">Range 2</text>
  <text class="small" x="386" y="216">2026-02-01 ~ 02-02</text>
  <rect class="hit" x="610" y="158" width="220" height="84"/>
  <text class="label" x="654" y="190">Range N</text>
  <text class="small" x="642" y="216">2026-05-03 ~ 05-04</text>

  <rect class="skip" x="110" y="334" width="180" height="70"/>
  <text class="label" x="154" y="366">Skip</text>
  <text class="small" x="142" y="388">not possible</text>
  <rect class="skip" x="370" y="334" width="180" height="70"/>
  <text class="label" x="414" y="366">Skip</text>
  <text class="small" x="402" y="388">not possible</text>
  <rect class="heap" x="640" y="324" width="270" height="90"/>
  <text class="label" x="692" y="358">Read Heap Range</text>
  <text class="small" x="682" y="384">lossy match, recheck rows</text>
  <path class="arrow" d="M200 242 L200 334"/>
  <path class="arrow" d="M460 242 L460 334"/>
  <path class="arrow" d="M720 242 L760 324"/>

  <rect class="heap" x="170" y="482" width="760" height="52"/>
  <text class="label" x="198" y="516">Heap blocks are physically ordered enough for summaries to be useful</text>
  <path class="dash" d="M775 414 L710 482"/>
  <text class="text" x="86" y="622">实现重点：索引极小、过滤粗糙；收益来自跳过 block range，不来自精确定位单行。列值和物理顺序越相关，效果越好。</text>
</svg>
