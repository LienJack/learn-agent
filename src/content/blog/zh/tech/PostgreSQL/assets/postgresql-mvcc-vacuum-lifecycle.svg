<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL MVCC dead tuple and vacuum lifecycle</title>
  <desc id="desc">The lifecycle from update and delete to dead tuple accumulation, vacuum cleanup, free space map, visibility map, and xid freezing.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .write { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .dead { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .vacuum { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .risk { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .text { font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="560"/>
  <text class="label" x="44" y="54">MVCC 的代价：dead tuple 与 VACUUM</text>
  <text class="text" x="44" y="84">多版本让读写少互斥，但旧版本不会立刻消失；它们要等没有快照需要时才能清理。</text>

  <rect class="write" x="58" y="142" width="216" height="92" rx="14"/>
  <text class="label" x="82" y="178">UPDATE / DELETE</text>
  <text class="small" x="82" y="206">旧版本被标记失效</text>

  <rect class="dead" x="342" y="142" width="216" height="92" rx="14"/>
  <text class="label" x="366" y="178">dead tuple</text>
  <text class="small" x="366" y="206">等所有相关快照结束</text>

  <rect class="risk" x="342" y="300" width="216" height="112" rx="14"/>
  <text class="label" x="366" y="336">长事务拖住回收</text>
  <text class="small" x="366" y="364">idle in transaction</text>
  <text class="small" x="366" y="392">老快照仍可能看旧版本</text>

  <rect class="vacuum" x="626" y="142" width="216" height="92" rx="14"/>
  <text class="label" x="650" y="178">VACUUM</text>
  <text class="small" x="650" y="206">清理死版本并复用空间</text>

  <rect class="box" x="890" y="88" width="188" height="82" rx="14"/>
  <text class="label" x="914" y="122">FSM</text>
  <text class="small" x="914" y="150">记录页内可用空间</text>

  <rect class="box" x="890" y="210" width="188" height="82" rx="14"/>
  <text class="label" x="914" y="244">Visibility Map</text>
  <text class="small" x="914" y="272">标记 all-visible 页</text>

  <rect class="box" x="626" y="338" width="216" height="92" rx="14"/>
  <text class="label" x="650" y="374">冻结老 XID</text>
  <text class="small" x="650" y="402">降低 wraparound 风险</text>

  <path class="arrow" d="M274 188 C302 188 310 188 338 188"/>
  <path class="arrow" d="M558 188 C586 188 594 188 622 188"/>
  <path class="arrow" d="M842 174 C866 156 866 134 886 130"/>
  <path class="arrow" d="M842 202 C866 218 866 248 886 252"/>
  <path class="arrow" d="M734 234 C734 270 734 294 734 334"/>
  <path class="dash" d="M450 300 C450 266 450 258 450 238"/>
  <text class="small" x="474" y="270">不能清理</text>
  <path class="dash" d="M734 430 C734 470 166 470 166 238"/>
  <text class="small" x="372" y="492">释放的空间后续 INSERT / UPDATE 可复用</text>
</svg>
