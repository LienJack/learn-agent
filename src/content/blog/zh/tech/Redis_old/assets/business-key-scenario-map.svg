<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
	<title id="title">Redis 业务场景与 Key 类型映射</title>
	<desc id="desc">手绘风格输入输出图，展示商品、购物车、订单、秒杀、排行和签到等业务形状如何映射到 Redis key 与数据类型。</desc>
	<defs>
		<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="#191713" />
		</marker>
		<filter id="rough">
			<feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="22" result="noise" />
			<feDisplacementMap in="SourceGraphic" in2="noise" scale="1.25" />
		</filter>
		<style>
			.bg { fill: #fbf6e8; }
			.node { fill: #fffdf5; stroke: #191713; stroke-width: 3; filter: url(#rough); }
			.hot { fill: #ffe8a8; stroke: #191713; stroke-width: 3; filter: url(#rough); }
			.line { fill: none; stroke: #191713; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); filter: url(#rough); }
			.thin { fill: none; stroke: #191713; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; filter: url(#rough); }
			.faint { fill: none; stroke: #cdbf9b; stroke-width: 1.3; opacity: .34; stroke-linecap: round; }
			.text { font-family: "Kaiti SC", "STKaiti", "Songti SC", serif; fill: #191713; font-size: 27px; font-weight: 700; }
			.small { font-family: "Kaiti SC", "STKaiti", "Songti SC", serif; fill: #191713; font-size: 19px; }
			.caption { font-family: "Kaiti SC", "STKaiti", "Songti SC", serif; fill: #4b4031; font-size: 24px; }
		</style>
	</defs>
	<rect class="bg" width="1200" height="675" />
	<path class="faint" d="M78 150 h120 v40 h72 M930 146 h102 v42 h84 M128 536 h150 v-48 h50 M880 548 h125 v-44 h80" />
	<circle cx="198" cy="190" r="5" fill="#d9c99f" opacity=".55" />
	<circle cx="1032" cy="188" r="5" fill="#d9c99f" opacity=".55" />
	<circle cx="1005" cy="504" r="5" fill="#d9c99f" opacity=".55" />

	<text x="86" y="84" class="text">从业务形状反推 Key 设计</text>
	<text x="86" y="118" class="small">先看访问方式，再决定类型、粒度、TTL 和命名</text>

	<g transform="translate(72 185)">
		<rect class="node" x="0" y="0" width="168" height="94" rx="16" />
		<path class="thin" d="M50 58 h68 l12 -30 H62z" />
		<circle class="thin" cx="62" cy="70" r="7" />
		<circle class="thin" cx="112" cy="70" r="7" />
		<text class="text" x="84" y="88" text-anchor="middle">商品</text>
	</g>
	<g transform="translate(72 312)">
		<rect class="node" x="0" y="0" width="168" height="94" rx="16" />
		<path class="thin" d="M48 42 h72 v35 H48z M60 42 v-15 h48 v15" />
		<text class="text" x="84" y="88" text-anchor="middle">购物车</text>
	</g>
	<g transform="translate(72 438)">
		<rect class="node" x="0" y="0" width="168" height="94" rx="16" />
		<path class="thin" d="M54 28 h62 v50 H54z M66 44 h38 M66 58 h26" />
		<text class="text" x="84" y="88" text-anchor="middle">订单</text>
	</g>

	<g transform="translate(500 178)">
		<rect class="hot" x="0" y="0" width="200" height="128" rx="22" />
		<text class="text" x="100" y="44" text-anchor="middle">选型器</text>
		<path class="thin" d="M58 70 h84 M70 92 h60" />
		<path class="thin" d="M44 58 c56 -38 98 -38 112 0" />
		<text class="small" x="100" y="118" text-anchor="middle">类型 / 粒度 / TTL</text>
	</g>
	<g transform="translate(500 370)">
		<rect class="hot" x="0" y="0" width="200" height="128" rx="22" />
		<text class="text" x="100" y="44" text-anchor="middle">命名规范</text>
		<path class="thin" d="M50 72 h100 M50 92 h100" />
		<path class="thin" d="M75 58 v48 M118 58 v48" />
		<text class="small" x="100" y="118" text-anchor="middle">业务:模块:标识</text>
	</g>

	<g transform="translate(962 150)">
		<rect class="node" x="0" y="0" width="168" height="82" rx="16" />
		<text class="text" x="84" y="36" text-anchor="middle">String</text>
		<text class="small" x="84" y="64" text-anchor="middle">详情/状态</text>
	</g>
	<g transform="translate(962 254)">
		<rect class="node" x="0" y="0" width="168" height="82" rx="16" />
		<text class="text" x="84" y="36" text-anchor="middle">Hash</text>
		<text class="small" x="84" y="64" text-anchor="middle">字段对象</text>
	</g>
	<g transform="translate(962 358)">
		<rect class="node" x="0" y="0" width="168" height="82" rx="16" />
		<text class="text" x="84" y="36" text-anchor="middle">ZSet</text>
		<text class="small" x="84" y="64" text-anchor="middle">排行范围</text>
	</g>
	<g transform="translate(962 462)">
		<rect class="node" x="0" y="0" width="168" height="82" rx="16" />
		<text class="text" x="84" y="36" text-anchor="middle">Bitmap</text>
		<text class="small" x="84" y="64" text-anchor="middle">签到开关</text>
	</g>

	<path class="line" d="M250 232 C342 220 407 218 488 236" />
	<path class="line" d="M250 359 C355 354 420 334 490 292" />
	<path class="line" d="M250 485 C350 492 420 465 490 432" />
	<path class="line" d="M702 238 C798 205 875 186 950 190" />
	<path class="line" d="M702 270 C800 270 875 286 950 298" />
	<path class="line" d="M702 432 C802 392 878 390 950 398" />
	<path class="line" d="M702 472 C800 510 878 510 950 504" />
	<path class="line" d="M600 314 v44" />

	<text x="288" y="623" class="caption">真实业务里的 Redis 设计，不是选一个命令，而是给访问模式找合适形状。</text>
</svg>
