<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">PostgreSQL GIN index implementation</title>
  <desc id="desc">A GIN index decomposes composite values into keys and maps each key to posting lists or posting trees of TIDs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4a5a"/></marker>
    <style>
      .bg { fill: #f8faf9; }
      .box { fill: #ffffff; stroke: #b8c6c9; stroke-width: 2; rx: 10; }
      .key { fill: #f0f9f0; stroke: #5f9a68; stroke-width: 2; rx: 8; }
      .posting { fill: #fff7e6; stroke: #b88a38; stroke-width: 2; rx: 8; }
      .heap { fill: #eef2ff; stroke: #6875b4; stroke-width: 2; rx: 8; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; fill: #1d2b34; font-weight: 700; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #26363d; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #3b4c54; }
      .arrow { stroke: #2f4a5a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6d7f86; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1120" height="660"/>
  <text class="label" x="40" y="48">GIN：倒排索引，key -> TID 集合</text>
  <text class="text" x="40" y="78">适合数组、JSONB、全文检索这种“一行拆出多个可检索 key”的场景。</text>
  <rect class="box" x="40" y="112" width="1040" height="470"/>

  <rect class="key" x="78" y="168" width="240" height="126"/>
  <text class="label" x="118" y="202">Row Value</text>
  <text class="small" x="108" y="232">tags = [postgres, index]</text>
  <text class="small" x="108" y="256">payload = {"channel":"email"}</text>

  <rect class="key" x="420" y="142" width="220" height="70"/>
  <text class="label" x="472" y="174">Key Entry</text>
  <text class="small" x="466" y="196">postgres</text>
  <rect class="key" x="420" y="240" width="220" height="70"/>
  <text class="label" x="472" y="272">Key Entry</text>
  <text class="small" x="486" y="294">index</text>
  <rect class="key" x="420" y="338" width="220" height="70"/>
  <text class="label" x="472" y="370">Key Entry</text>
  <text class="small" x="458" y="392">channel=email</text>
  <path class="arrow" d="M318 214 L420 176"/>
  <path class="arrow" d="M318 232 L420 276"/>
  <path class="arrow" d="M318 252 L420 374"/>

  <rect class="posting" x="744" y="142" width="260" height="70"/>
  <text class="label" x="790" y="174">Posting List</text>
  <text class="small" x="786" y="196">TID 1, TID 9, TID 30</text>
  <rect class="posting" x="744" y="240" width="260" height="70"/>
  <text class="label" x="790" y="272">Posting List</text>
  <text class="small" x="786" y="294">TID 1, TID 3, TID 30</text>
  <rect class="posting" x="744" y="338" width="260" height="70"/>
  <text class="label" x="790" y="370">Posting Tree</text>
  <text class="small" x="784" y="392">large TID set becomes tree</text>
  <path class="arrow" d="M640 176 L744 176"/>
  <path class="arrow" d="M640 276 L744 276"/>
  <path class="arrow" d="M640 374 L744 374"/>

  <rect class="heap" x="370" y="474" width="410" height="64"/>
  <text class="label" x="416" y="512">Bitmap + Heap Recheck</text>
  <text class="small" x="612" y="512">combine TIDs, fetch heap, verify predicate</text>
  <path class="dash" d="M874 408 C848 462, 792 486, 780 502"/>
  <text class="text" x="86" y="622">实现重点：读快来自 token 倒排；写慢来自一行可能维护多个 key、pending list、posting list/tree 合并。</text>
</svg>
