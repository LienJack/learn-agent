<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440" role="img" aria-labelledby="title desc">
<title id="title">事务边界：共同进退</title>
<desc id="desc">一组 SQL 被包在同一个提交或回滚边界里</desc>
<defs>
  <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L16 9 L2 16 Z" fill="#222"/></marker>
  <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="7"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer></filter>
  <filter id="wobble"><feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="2" seed="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/></filter>
</defs>
<style>
  svg { background: #f7f1df; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .rough { filter: url(#wobble); }
  .faint { opacity: .13; }
  text { paint-order: stroke; stroke: #f7f1df; stroke-width: 7px; stroke-linejoin: round; }
</style>
<rect width="100%" height="100%" fill="#f7f1df"/>
<rect width="100%" height="100%" filter="url(#paper)" opacity="0.7"/>
<g class="faint" fill="none" stroke="#222" stroke-width="3">
  <path d="M180 1180 C520 1040 760 1260 1120 1110 S1840 1010 2240 1160"/>
  <path d="M210 250 H430 V310 H640 M1840 230 H2050 V300 H2320"/>
  <circle cx="430" cy="310" r="9"/><circle cx="640" cy="310" r="9"/><circle cx="2050" cy="300" r="9"/>
  <path d="M230 980 h170 v70 h180 M1970 980 h180 v-70 h210"/>
</g>
<text x="1280" y="100" text-anchor="middle" dominant-baseline="middle" font-size="58" font-weight="800" fill="#232323" data-key="title"><tspan x="1280" dy="0">事务边界：共同进退</tspan></text>
<text x="1280" y="168" text-anchor="middle" dominant-baseline="middle" font-size="30" font-weight="500" fill="#555" data-key="subtitle"><tspan x="1280" dy="0">一组 SQL 被包在同一个提交或回滚边界里</tspan></text>

<rect x="280" y="300" width="2000" height="650" rx="50" ry="50" fill="#fff8df" stroke="#d7ac33" stroke-width="6" class="rough" />
<text x="1280" y="340" text-anchor="middle" dominant-baseline="middle" font-size="42" font-weight="800" fill="#6b5400" data-key="boundary"><tspan x="1280" dy="0">事务边界</tspan></text>
<g><rect x="150" y="580" width="260" height="130" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="280" y="645" text-anchor="middle" dominant-baseline="middle" font-size="42" font-weight="600" fill="#232323" data-key="start"><tspan x="280" dy="0">START</tspan></text></g>
<line x1="410" y1="645" x2="560" y2="645" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<g><rect x="560" y="560" width="260" height="170" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="690" y="645" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="600" fill="#232323" data-key="create_order"><tspan x="690" dy="0">创建订单</tspan></text></g>
<line x1="820" y1="645" x2="970" y2="645" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<g><rect x="970" y="560" width="260" height="170" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1100" y="645" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="600" fill="#232323" data-key="deduct_stock"><tspan x="1100" dy="0">扣库存</tspan></text></g>
<line x1="1230" y1="645" x2="1380" y2="645" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<g><rect x="1380" y="560" width="260" height="170" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1510" y="645" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="600" fill="#232323" data-key="payment"><tspan x="1510" dy="0">写支付单</tspan></text></g>
<line x1="1640" y1="645" x2="1790" y2="645" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<g><rect x="1790" y="560" width="260" height="170" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1920" y="645" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="600" fill="#232323" data-key="update_status"><tspan x="1920" dy="0">更新状态</tspan></text></g>
<line x1="2050" y1="645" x2="2200" y2="645" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<g><rect x="2200" y="500" width="250" height="120" rx="26" ry="26" fill="#eef8e8" stroke="#222" stroke-width="5" class="rough" /><text x="2325" y="560" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="600" fill="#232323" data-key="commit"><tspan x="2325" dy="0">COMMIT</tspan></text></g>
<g><rect x="2200" y="760" width="250" height="120" rx="26" ry="26" fill="#fff0ec" stroke="#222" stroke-width="5" class="rough" /><text x="2325" y="820" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="rollback"><tspan x="2325" dy="0">ROLLBACK</tspan></text></g>
<path d="M1920 730 C2020 800 2100 820 2200 820" fill="none" stroke="#b24b38" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" class="rough"/>
<text x="1280" y="1040" text-anchor="middle" dominant-baseline="middle" font-size="42" font-weight="800" fill="#232323" data-key="caption"><tspan x="1280" dy="0">中间任何一步失败，都不能留下半成品</tspan></text>
<g transform="translate(650 625) scale(0.55)" fill="none" stroke="#222" stroke-width="5" class="rough"><path d="M0 0 h86 l38 40 v126 h-124 z"/><path d="M86 0 v42 h38"/><line x1="22" y1="76" x2="102" y2="76"/><line x1="22" y1="106" x2="92" y2="106"/></g><g transform="translate(1100 630) scale(0.65)" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" class="rough"><rect x="-50" y="-4" width="100" height="78" rx="12"/><path d="M-28 -4 v-24 a28 28 0 0 1 56 0 v24"/><line x1="0" y1="28" x2="0" y2="48"/></g><g transform="translate(1470 615) scale(0.55)" fill="none" stroke="#222" stroke-width="5" class="rough"><path d="M0 0 h86 l38 40 v126 h-124 z"/><path d="M86 0 v42 h38"/><line x1="22" y1="76" x2="102" y2="76"/><line x1="22" y1="106" x2="92" y2="106"/></g><g transform="translate(1885 630) scale(0.65)" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" class="rough"><circle cx="0" cy="0" r="34"/><circle cx="0" cy="0" r="12"/><path d="M0 -58 v18 M0 40 v18 M-58 0 h18 M40 0 h18 M-41 -41 l13 13 M28 28 l13 13 M41 -41 l-13 13 M-28 28 l-13 13"/></g>
</svg>