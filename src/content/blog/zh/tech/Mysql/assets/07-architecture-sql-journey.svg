<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440" role="img" aria-labelledby="title desc">
<title id="title">一条 SQL 穿过 MySQL 各层</title>
<desc id="desc">从文本到结果：认证、理解、选路、执行、取页、返回</desc>
<defs>
  <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L16 9 L2 16 Z" fill="#222"/></marker>
  <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="7"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer></filter>
  <filter id="wobble"><feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="2" seed="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/></filter>
</defs>
<style>
  svg { background: #f7f1df; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .rough { filter: url(#wobble); }
  .faint { opacity: .13; }
  text { paint-order: stroke; stroke: #f7f1df; stroke-width: 7px; stroke-linejoin: round; }
</style>
<rect width="100%" height="100%" fill="#f7f1df"/>
<rect width="100%" height="100%" filter="url(#paper)" opacity="0.7"/>
<g class="faint" fill="none" stroke="#222" stroke-width="3">
  <path d="M180 1180 C520 1040 760 1260 1120 1110 S1840 1010 2240 1160"/>
  <path d="M210 250 H430 V310 H640 M1840 230 H2050 V300 H2320"/>
  <circle cx="430" cy="310" r="9"/><circle cx="640" cy="310" r="9"/><circle cx="2050" cy="300" r="9"/>
  <path d="M230 980 h170 v70 h180 M1970 980 h180 v-70 h210"/>
</g>
<text x="1280" y="100" text-anchor="middle" dominant-baseline="middle" font-size="58" font-weight="800" fill="#232323" data-key="title"><tspan x="1280" dy="0">一条 SQL 穿过 MySQL 各层</tspan></text>
<text x="1280" y="168" text-anchor="middle" dominant-baseline="middle" font-size="30" font-weight="500" fill="#555" data-key="subtitle"><tspan x="1280" dy="0">从文本到结果：认证、理解、选路、执行、取页、返回</tspan></text>

<g><rect x="120" y="590" width="260" height="130" rx="26" ry="26" fill="#eef7ff" stroke="#222" stroke-width="5" class="rough" /><text x="250" y="655" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="600" fill="#232323" data-key="sql_text"><tspan x="250" dy="0">SQL 文本</tspan></text></g>
<line x1="380" y1="655" x2="540" y2="655" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><g><rect x="540" y="590" width="260" height="130" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="670" y="655" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="600" fill="#232323" data-key="connector"><tspan x="670" dy="0">连接器</tspan></text></g>
<line x1="800" y1="655" x2="960" y2="655" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><g><rect x="960" y="590" width="300" height="130" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1110" y="655" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="600" fill="#232323" data-key="parse_preprocess"><tspan x="1110" dy="0">解析/预处理</tspan></text></g>
<line x1="1260" y1="655" x2="1420" y2="655" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><rect x="1420" y="570" width="300" height="170" rx="26" ry="26" fill="#fdeaa6" stroke="#e1bc45" stroke-width="3" class="rough" /><g><rect x="1420" y="590" width="300" height="130" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1570" y="633" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="600" fill="#232323" data-key="optimizer"><tspan x="1570" dy="0">优化器</tspan><tspan x="1570" dy="44">选路径</tspan></text></g>
<line x1="1720" y1="655" x2="1880" y2="655" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><rect x="1880" y="570" width="300" height="170" rx="26" ry="26" fill="#fdeaa6" stroke="#e1bc45" stroke-width="3" class="rough" /><g><rect x="1880" y="590" width="300" height="130" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="2030" y="633" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="600" fill="#232323" data-key="executor"><tspan x="2030" dy="0">执行器</tspan><tspan x="2030" dy="44">调引擎</tspan></text></g>
<line x1="2180" y1="655" x2="2360" y2="655" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><g><rect x="2360" y="590" width="160" height="130" rx="26" ry="26" fill="#eef8e8" stroke="#222" stroke-width="5" class="rough" /><text x="2440" y="655" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="600" fill="#232323" data-key="result"><tspan x="2440" dy="0">结果</tspan></text></g>
<path d="M2030 720 C2020 850 1840 900 1640 900 L900 900 C700 900 610 820 650 720" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="12 14" marker-end="url(#arrow)" class="rough"/>
<g><rect x="830" y="840" width="330" height="120" rx="26" ry="26" fill="#fff8df" stroke="#222" stroke-width="5" class="rough" /><text x="995" y="879.5" text-anchor="middle" dominant-baseline="middle" font-size="32" font-weight="600" fill="#232323" data-key="innodb"><tspan x="995" dy="0">InnoDB</tspan><tspan x="995" dy="41">B+ 树 / 页</tspan></text></g>
<g><rect x="1220" y="840" width="330" height="120" rx="26" ry="26" fill="#fff8df" stroke="#222" stroke-width="5" class="rough" /><text x="1385" y="900" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="600" fill="#232323" data-key="buffer_pool"><tspan x="1385" dy="0">Buffer Pool</tspan></text></g>
<g><rect x="1610" y="840" width="330" height="120" rx="26" ry="26" fill="#fff8df" stroke="#222" stroke-width="5" class="rough" /><text x="1775" y="900" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="600" fill="#232323" data-key="disk_pages"><tspan x="1775" dy="0">磁盘页</tspan></text></g>
<text x="1280" y="1135" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="800" fill="#232323" data-key="caption"><tspan x="1280" dy="0">前半段确认能不能执行，后半段决定怎么执行更划算</tspan></text>
</svg>