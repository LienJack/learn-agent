<g><rect x="1900" y="820" width="360" height="150" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="2080" y="873" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="600" fill="#232323" data-key="leaf_data_5"><tspan x="2080" dy="0">叶子页</tspan><tspan x="2080" dy="44">整行数据</tspan></text></g>
<line x1="660" y1="895" x2="700" y2="895" stroke="#222" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><line x1="1060" y1="895" x2="1100" y2="895" stroke="#222" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><line x1="1460" y1="895" x2="1500" y2="895" stroke="#222" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><line x1="1860" y1="895" x2="1900" y2="895" stroke="#222" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<text x="1280" y="1110" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="700" fill="#232323" data-key="caption"><tspan x="1280" dy="0">非叶子页负责导航，真实数据在叶子页，叶子页之间按顺序串起来</tspan></text>
<g transform="translate(2180 1120) scale(1.1)" fill="none" stroke="#222" stroke-width="5" class="rough"><ellipse cx="0" cy="0" rx="70" ry="24"/><path d="M-70 0 v90 q70 32 140 0 v-90"/><ellipse cx="0" cy="90" rx="70" ry="24"/></g><text x="2180" y="1260" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="700" fill="#232323" data-key="page_unit"><tspan x="2180" dy="0">页是读写单位</tspan></text>
</svg>