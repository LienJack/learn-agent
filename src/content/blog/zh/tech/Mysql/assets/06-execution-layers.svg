<line x1="1120" y1="690" x2="1440" y2="690" stroke="#d7ac33" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><text x="1280" y="635" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="800" fill="#6b5400" data-key="handler_api"><tspan x="1280" dy="0">Handler API</tspan></text>
<text x="1280" y="1190" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="800" fill="#232323" data-key="caption"><tspan x="1280" dy="0">SQL 的含义在 Server 层决定，数据的组织在 InnoDB 层完成</tspan></text>
