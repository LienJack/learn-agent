<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440" role="img" aria-labelledby="title desc">
<title id="title">三种查询路径对比</title>
<desc id="desc">优化器在主键、全表扫描、二级索引回表之间估算成本</desc>
<defs>
  <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L16 9 L2 16 Z" fill="#222"/></marker>
  <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="7"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer></filter>
  <filter id="wobble"><feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="2" seed="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/></filter>
</defs>
<style>
  svg { background: #f7f1df; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .rough { filter: url(#wobble); }
  .faint { opacity: .13; }
  text { paint-order: stroke; stroke: #f7f1df; stroke-width: 7px; stroke-linejoin: round; }
</style>
<rect width="100%" height="100%" fill="#f7f1df"/>
<rect width="100%" height="100%" filter="url(#paper)" opacity="0.7"/>
<g class="faint" fill="none" stroke="#222" stroke-width="3">
  <path d="M180 1180 C520 1040 760 1260 1120 1110 S1840 1010 2240 1160"/>
  <path d="M210 250 H430 V310 H640 M1840 230 H2050 V300 H2320"/>
  <circle cx="430" cy="310" r="9"/><circle cx="640" cy="310" r="9"/><circle cx="2050" cy="300" r="9"/>
  <path d="M230 980 h170 v70 h180 M1970 980 h180 v-70 h210"/>
</g>
<text x="1280" y="100" text-anchor="middle" dominant-baseline="middle" font-size="58" font-weight="800" fill="#232323" data-key="title"><tspan x="1280" dy="0">三种查询路径对比</tspan></text>
<text x="1280" y="168" text-anchor="middle" dominant-baseline="middle" font-size="30" font-weight="500" fill="#555" data-key="subtitle"><tspan x="1280" dy="0">优化器在主键、全表扫描、二级索引回表之间估算成本</tspan></text>

<rect x="220" y="340" width="620" height="620" rx="34" ry="34" fill="#fdeaa6" stroke="#e1bc45" stroke-width="3" class="rough" /><text x="530" y="390" text-anchor="middle" dominant-baseline="middle" font-size="44" font-weight="800" fill="#232323" data-key="primary_lookup"><tspan x="530" dy="0">主键查询</tspan></text><g><rect x="350" y="500" width="360" height="110" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="530" y="555" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="primary_tree"><tspan x="530" dy="0">主键 B+ 树</tspan></text></g><line x1="530" y1="610" x2="530" y2="730" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><g><rect x="350" y="730" width="360" height="110" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="530" y="785" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="full_row"><tspan x="530" dy="0">叶子页整行</tspan></text></g><line x1="530" y1="840" x2="530" y2="930" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><text x="530" y="1010" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="800" fill="#6b5400" data-key="short_path"><tspan x="530" dy="0">路径最短</tspan></text>
<rect x="970" y="340" width="620" height="620" rx="34" ry="34" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1280" y="390" text-anchor="middle" dominant-baseline="middle" font-size="44" font-weight="800" fill="#232323" data-key="table_scan"><tspan x="1280" dy="0">全表扫描</tspan></text><g><rect x="1100" y="500" width="360" height="110" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1280" y="555" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="first_row"><tspan x="1280" dy="0">第一行</tspan></text></g><line x1="1280" y1="610" x2="1280" y2="730" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><g><rect x="1100" y="730" width="360" height="110" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1280" y="785" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="next_row"><tspan x="1280" dy="0">下一行</tspan></text></g><line x1="1280" y1="840" x2="1280" y2="930" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><text x="1280" y="1010" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="800" fill="#232323" data-key="row_filter"><tspan x="1280" dy="0">逐行判断</tspan></text>
<rect x="1720" y="340" width="620" height="620" rx="34" ry="34" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="2030" y="390" text-anchor="middle" dominant-baseline="middle" font-size="44" font-weight="800" fill="#232323" data-key="secondary_index"><tspan x="2030" dy="0">二级索引</tspan></text><g><rect x="1850" y="500" width="360" height="110" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="2030" y="555" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="idx_name"><tspan x="2030" dy="0">idx_name</tspan></text></g><line x1="2030" y1="610" x2="2030" y2="730" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><g><rect x="1850" y="730" width="360" height="110" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="2030" y="785" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="get_id"><tspan x="2030" dy="0">拿到主键 id</tspan></text></g><line x1="2030" y1="840" x2="2030" y2="930" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><text x="2030" y="1010" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="800" fill="#232323" data-key="back_to_table"><tspan x="2030" dy="0">再回表取整行</tspan></text>
<text x="1280" y="1210" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="800" fill="#232323" data-key="caption"><tspan x="1280" dy="0">用了索引不等于一定快，关键看扫描范围和回表成本</tspan></text>
</svg>