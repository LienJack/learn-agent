<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440" role="img" aria-labelledby="title desc">
<title id="title">LRU young / old 分区</title>
<desc id="desc">新页先进入 old 区，经得起再次访问才进入 young 区</desc>
<defs>
  <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L16 9 L2 16 Z" fill="#222"/></marker>
  <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="7"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer></filter>
  <filter id="wobble"><feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="2" seed="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/></filter>
</defs>
<style>
  svg { background: #f7f1df; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .rough { filter: url(#wobble); }
  .faint { opacity: .13; }
  text { paint-order: stroke; stroke: #f7f1df; stroke-width: 7px; stroke-linejoin: round; }
</style>
<rect width="100%" height="100%" fill="#f7f1df"/>
<rect width="100%" height="100%" filter="url(#paper)" opacity="0.7"/>
<g class="faint" fill="none" stroke="#222" stroke-width="3">
  <path d="M180 1180 C520 1040 760 1260 1120 1110 S1840 1010 2240 1160"/>
  <path d="M210 250 H430 V310 H640 M1840 230 H2050 V300 H2320"/>
  <circle cx="430" cy="310" r="9"/><circle cx="640" cy="310" r="9"/><circle cx="2050" cy="300" r="9"/>
  <path d="M230 980 h170 v70 h180 M1970 980 h180 v-70 h210"/>
</g>
<text x="1280" y="100" text-anchor="middle" dominant-baseline="middle" font-size="58" font-weight="800" fill="#232323" data-key="title"><tspan x="1280" dy="0">LRU young / old 分区</tspan></text>
<text x="1280" y="168" text-anchor="middle" dominant-baseline="middle" font-size="30" font-weight="500" fill="#555" data-key="subtitle"><tspan x="1280" dy="0">新页先进入 old 区，经得起再次访问才进入 young 区</tspan></text>

<rect x="260" y="520" width="2040" height="210" rx="48" ry="48" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" />
<rect x="260" y="520" width="1260" height="210" rx="48" ry="48" fill="#fdeaa6" stroke="#e1bc45" stroke-width="3" class="rough" />
<text x="890" y="597" text-anchor="middle" dominant-baseline="middle" font-size="44" font-weight="800" fill="#232323" data-key="young_zone"><tspan x="890" dy="0">young 区</tspan><tspan x="890" dy="56">真正热点页</tspan></text>
<text x="1910" y="597" text-anchor="middle" dominant-baseline="middle" font-size="44" font-weight="800" fill="#232323" data-key="old_zone"><tspan x="1910" dy="0">old 区</tspan><tspan x="1910" dy="56">新读入页</tspan></text>
<line x1="1520" y1="520" x2="1520" y2="730" stroke="#222" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 12" class="rough"/>
<g><rect x="1780" y="290" width="360" height="130" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1960" y="355" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="600" fill="#232323" data-key="new_page"><tspan x="1960" dy="0">新页进入</tspan></text></g>
<line x1="1960" y1="420" x2="1960" y2="520" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<path d="M1950 750 C1840 950 1500 1010 1180 760" fill="none" stroke="#d7ac33" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" class="rough"/>
<text x="1580" y="985" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="800" fill="#6b5400" data-key="revisit_after_time"><tspan x="1580" dy="0">超过时间门槛后再次访问</tspan></text>
<g><rect x="340" y="850" width="420" height="130" rx="26" ry="26" fill="#fff8df" stroke="#d7ac33" stroke-width="5" class="rough" /><text x="550" y="915" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="600" fill="#232323" data-key="keep_hot"><tspan x="550" dy="0">留住热点</tspan></text></g>
<g><rect x="1780" y="850" width="420" height="130" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1990" y="915" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="600" fill="#232323" data-key="evict_cold"><tspan x="1990" dy="0">快速淘汰冷页</tspan></text></g>
<line x1="1990" y1="730" x2="1990" y2="850" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<text x="1280" y="1160" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="800" fill="#232323" data-key="caption"><tspan x="1280" dy="0">不要让全表扫描和预读页挤走真正的热点数据</tspan></text>
</svg>