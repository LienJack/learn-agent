<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440" role="img" aria-labelledby="title desc">
<title id="title">MySQL 锁的层级体系</title>
<desc id="desc">粒度越细，并发越高，但管理成本也更高</desc>
<defs>
  <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L16 9 L2 16 Z" fill="#222"/></marker>
  <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="7"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer></filter>
  <filter id="wobble"><feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="2" seed="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/></filter>
</defs>
<style>
  svg { background: #f7f1df; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .rough { filter: url(#wobble); }
  .faint { opacity: .13; }
  text { paint-order: stroke; stroke: #f7f1df; stroke-width: 7px; stroke-linejoin: round; }
</style>
<rect width="100%" height="100%" fill="#f7f1df"/>
<rect width="100%" height="100%" filter="url(#paper)" opacity="0.7"/>
<g class="faint" fill="none" stroke="#222" stroke-width="3">
  <path d="M180 1180 C520 1040 760 1260 1120 1110 S1840 1010 2240 1160"/>
  <path d="M210 250 H430 V310 H640 M1840 230 H2050 V300 H2320"/>
  <circle cx="430" cy="310" r="9"/><circle cx="640" cy="310" r="9"/><circle cx="2050" cy="300" r="9"/>
  <path d="M230 980 h170 v70 h180 M1970 980 h180 v-70 h210"/>
</g>
<text x="1280" y="100" text-anchor="middle" dominant-baseline="middle" font-size="58" font-weight="800" fill="#232323" data-key="title"><tspan x="1280" dy="0">MySQL 锁的层级体系</tspan></text>
<text x="1280" y="168" text-anchor="middle" dominant-baseline="middle" font-size="30" font-weight="500" fill="#555" data-key="subtitle"><tspan x="1280" dy="0">粒度越细，并发越高，但管理成本也更高</tspan></text>

<rect x="1100" y="240" width="360" height="120" rx="28" ry="28" fill="#fdeaa6" stroke="#e1bc45" stroke-width="3" class="rough" /><g><rect x="1100" y="240" width="360" height="120" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1280" y="300" text-anchor="middle" dominant-baseline="middle" font-size="44" font-weight="600" fill="#232323" data-key="mysql_locks"><tspan x="1280" dy="0">MySQL 锁</tspan></text></g>
<line x1="1280" y1="360" x2="650" y2="520" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><line x1="1280" y1="360" x2="1280" y2="520" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><line x1="1280" y1="360" x2="1910" y2="520" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<g><rect x="430" y="520" width="440" height="150" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="650" y="572" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="table_lock"><tspan x="650" dy="0">表锁</tspan><tspan x="650" dy="46">整张表</tspan></text></g>
<g><rect x="1060" y="520" width="440" height="150" rx="26" ry="26" fill="#fff8df" stroke="#d7ac33" stroke-width="5" class="rough" /><text x="1280" y="572" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="row_lock"><tspan x="1280" dy="0">行锁</tspan><tspan x="1280" dy="46">索引记录</tspan></text></g>
<g><rect x="1690" y="520" width="440" height="150" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1910" y="572" text-anchor="middle" dominant-baseline="middle" font-size="36" font-weight="600" fill="#232323" data-key="intention_lock"><tspan x="1910" dy="0">意向锁</tspan><tspan x="1910" dy="46">表门口标记</tspan></text></g>
<line x1="1280" y1="670" x2="900" y2="860" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><line x1="1280" y1="670" x2="1280" y2="860" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><line x1="1280" y1="670" x2="1660" y2="860" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<g><rect x="720" y="860" width="360" height="140" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="900" y="930" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="600" fill="#232323" data-key="record_lock"><tspan x="900" dy="0">记录锁</tspan></text></g>
<g><rect x="1100" y="860" width="360" height="140" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1280" y="930" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="600" fill="#232323" data-key="gap_lock"><tspan x="1280" dy="0">间隙锁</tspan></text></g>
<rect x="1480" y="840" width="360" height="180" rx="26" ry="26" fill="#fdeaa6" stroke="#e1bc45" stroke-width="3" class="rough" /><g><rect x="1480" y="860" width="360" height="140" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1660" y="908" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="600" fill="#232323" data-key="next_key"><tspan x="1660" dy="0">Next-Key</tspan><tspan x="1660" dy="44">记录+间隙</tspan></text></g>
<g transform="translate(560 595) scale(0.7)" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" class="rough"><rect x="-50" y="-4" width="100" height="78" rx="12"/><path d="M-28 -4 v-24 a28 28 0 0 1 56 0 v24"/><line x1="0" y1="28" x2="0" y2="48"/></g><g transform="translate(1190 595) scale(0.7)" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" class="rough"><rect x="-50" y="-4" width="100" height="78" rx="12"/><path d="M-28 -4 v-24 a28 28 0 0 1 56 0 v24"/><line x1="0" y1="28" x2="0" y2="48"/></g><g transform="translate(1810 595) scale(0.7)" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" class="rough"><rect x="-50" y="-4" width="100" height="78" rx="12"/><path d="M-28 -4 v-24 a28 28 0 0 1 56 0 v24"/><line x1="0" y1="28" x2="0" y2="48"/></g>
<text x="1280" y="1140" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="800" fill="#232323" data-key="caption"><tspan x="1280" dy="0">锁不是越大越安全，而是要在正确性和并发之间取平衡</tspan></text>
</svg>