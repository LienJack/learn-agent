<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440" role="img" aria-labelledby="title desc">
<title id="title">索引查询 vs 全表扫描</title>
<desc id="desc">索引的核心价值：让 MySQL 少看数据</desc>
<defs>
  <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L16 9 L2 16 Z" fill="#222"/></marker>
  <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="7"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer></filter>
  <filter id="wobble"><feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="2" seed="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/></filter>
</defs>
<style>
  svg { background: #f7f1df; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .rough { filter: url(#wobble); }
  .faint { opacity: .13; }
  text { paint-order: stroke; stroke: #f7f1df; stroke-width: 7px; stroke-linejoin: round; }
</style>
<rect width="100%" height="100%" fill="#f7f1df"/>
<rect width="100%" height="100%" filter="url(#paper)" opacity="0.7"/>
<g class="faint" fill="none" stroke="#222" stroke-width="3">
  <path d="M180 1180 C520 1040 760 1260 1120 1110 S1840 1010 2240 1160"/>
  <path d="M210 250 H430 V310 H640 M1840 230 H2050 V300 H2320"/>
  <circle cx="430" cy="310" r="9"/><circle cx="640" cy="310" r="9"/><circle cx="2050" cy="300" r="9"/>
  <path d="M230 980 h170 v70 h180 M1970 980 h180 v-70 h210"/>
</g>
<text x="1280" y="100" text-anchor="middle" dominant-baseline="middle" font-size="58" font-weight="800" fill="#232323" data-key="title"><tspan x="1280" dy="0">索引查询 vs 全表扫描</tspan></text>
<text x="1280" y="168" text-anchor="middle" dominant-baseline="middle" font-size="30" font-weight="500" fill="#555" data-key="subtitle"><tspan x="1280" dy="0">索引的核心价值：让 MySQL 少看数据</tspan></text>

<text x="640" y="260" text-anchor="middle" dominant-baseline="middle" font-size="52" font-weight="800" fill="#232323" data-key="full_scan"><tspan x="640" dy="0">全表扫描</tspan></text>
<text x="1920" y="260" text-anchor="middle" dominant-baseline="middle" font-size="52" font-weight="800" fill="#232323" data-key="index_lookup"><tspan x="1920" dy="0">索引查询</tspan></text>
<rect x="250" y="350" width="780" height="620" rx="34" ry="34" fill="#fffaf0" stroke="#222" stroke-width="5" class="rough" />
<g transform="translate(380 470) scale(1.4)" fill="none" stroke="#222" stroke-width="4" class="rough"><rect x="0" y="0" width="160" height="112" rx="10"/><line x1="0" y1="0" x2="160" y2="0"/><line x1="0" y1="28" x2="160" y2="28"/><line x1="0" y1="56" x2="160" y2="56"/><line x1="0" y1="84" x2="160" y2="84"/><line x1="0" y1="112" x2="160" y2="112"/><line x1="54" y1="0" x2="54" y2="112"/><line x1="108" y1="0" x2="108" y2="112"/></g><g transform="translate(760 505) scale(1.2)" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" class="rough"><circle cx="0" cy="0" r="34"/><line x1="25" y1="25" x2="62" y2="62"/></g>
<line x1="430" y1="720" x2="850" y2="720" stroke="#222" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 14" marker-end="url(#arrow)" class="rough"/>
<g><rect x="350" y="820" width="210" height="120" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="455" y="880" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="600" fill="#232323" data-key="row_by_row"><tspan x="455" dy="0">逐行看</tspan></text></g>
<line x1="560" y1="880" x2="680" y2="880" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/><g><rect x="700" y="820" width="210" height="120" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="805" y="880" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="600" fill="#232323" data-key="filter"><tspan x="805" dy="0">再过滤</tspan></text></g>
<line x1="910" y1="880" x2="1010" y2="880" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<text x="640" y="1035" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="600" fill="#232323" data-key="scan_cost"><tspan x="640" dy="0">扫描范围大，I/O 成本高</tspan></text>
<rect x="1530" y="350" width="780" height="620" rx="34" ry="34" fill="#fffaf0" stroke="#222" stroke-width="5" class="rough" />
<rect x="1740" y="390" width="360" height="160" rx="28" ry="28" fill="#fdeaa6" stroke="#e1bc45" stroke-width="3" class="rough" />
<g transform="translate(1710 470) scale(1.25)" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round" class="rough"><circle cx="0" cy="0" r="28"/><circle cx="-62" cy="82" r="24"/><circle cx="62" cy="82" r="24"/><line x1="-14" y1="22" x2="-48" y2="62"/><line x1="14" y1="22" x2="48" y2="62"/></g><text x="1920" y="470" text-anchor="middle" dominant-baseline="middle" font-size="42" font-weight="800" fill="#232323" data-key="index_catalog"><tspan x="1920" dy="0">索引目录</tspan></text>
<line x1="1920" y1="560" x2="1920" y2="690" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<g><rect x="1740" y="690" width="360" height="120" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1920" y="750" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="600" fill="#232323" data-key="small_range"><tspan x="1920" dy="0">定位小范围</tspan></text></g>
<line x1="1920" y1="810" x2="1920" y2="930" stroke="#222" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<g><rect x="1740" y="930" width="360" height="120" rx="26" ry="26" fill="#fffdf6" stroke="#222" stroke-width="5" class="rough" /><text x="1920" y="990" text-anchor="middle" dominant-baseline="middle" font-size="40" font-weight="600" fill="#232323" data-key="target_rows"><tspan x="1920" dy="0">返回目标行</tspan></text></g>
<text x="1920" y="1140" text-anchor="middle" dominant-baseline="middle" font-size="38" font-weight="700" fill="#232323" data-key="caption"><tspan x="1920" dy="0">先找路标，再拿数据</tspan></text>
<line x1="1080" y1="650" x2="1480" y2="650" stroke="#d7ac33" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)" class="rough"/>
<text x="1280" y="600" text-anchor="middle" dominant-baseline="middle" font-size="42" font-weight="800" fill="#6b5400" data-key="less_data"><tspan x="1280" dy="0">少看数据</tspan></text>
</svg>