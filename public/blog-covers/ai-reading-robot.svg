		<path d="M199 424c18 9 37 26 52 48m-6-52c17 16 28 33 34 51m-1-40c16 13 28 28 35 46" fill="none" stroke="#ff6505" stroke-width="5" stroke-linecap="round" />
	</g>

	<g filter="url(#roughInk)" fill="none" stroke="#171717" stroke-linecap="round">
		<path d="M256 247c-11-20-24-35-40-46" stroke-width="6" />
		<path d="M299 239c-7-24-10-47-7-69" stroke-width="6" />
