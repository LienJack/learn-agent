		<path d="M602 211c43-3 76 11 99 42" stroke-width="6" />
		<path d="M658 232c31-10 60-9 88 3" stroke-width="6" />
		<path d="M532 291h7m21 0h7m21 0h7m21 0h7" stroke-width="6" />
		<circle cx="368" cy="304" r="24" fill="#fffdf3" stroke-width="7" />
	</g>
	</g>
</svg>
