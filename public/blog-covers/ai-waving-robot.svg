<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
	<title id="title">挥手的橘色机器人</title>
	<desc id="desc">一个 Claude Code 橘色机器人站在浅色背景中，右手循环挥动。</desc>
	<style>
		.robot-wave {
			animation: robot-wave 1.45s ease-in-out infinite;
			transform-box: view-box;
			transform-origin: 614px 242px;
		}

		.robot-bob {
			animation: robot-bob 2.2s ease-in-out infinite;
			transform-box: view-box;
			transform-origin: 450px 286px;
		}

		.antenna-dot {
			animation: antenna-pulse 1.7s ease-in-out infinite;
			transform-box: fill-box;
			transform-origin: center;
		}

		@keyframes robot-wave {
			0%,
			100% {
				transform: rotate(-8deg);
			}

			42% {
				transform: rotate(22deg);
			}

			68% {
				transform: rotate(-17deg);
			}
		}

		@keyframes robot-bob {
			0%,
			100% {
				transform: translateY(0);
			}

			50% {
				transform: translateY(-9px);
			}
		}

		@keyframes antenna-pulse {
			0%,
			100% {
				opacity: 0.62;
				transform: scale(0.88);
			}

			48% {
				opacity: 1;
				transform: scale(1.18);
			}
		}

		@media (prefers-reduced-motion: reduce) {
			.robot-wave,
			.robot-bob,
			.antenna-dot {
				animation: none;
			}
		}
	</style>
	<defs>
		<filter id="roughInk" x="-14%" y="-14%" width="128%" height="128%">
			<feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" seed="18" result="noise" />
			<feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1" />
		</filter>
		<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#24180f" flood-opacity="0.13" />
		</filter>
		<linearGradient id="coverBg" x1="0%" x2="100%" y1="0%" y2="100%">
			<stop offset="0%" stop-color="#fffdf8" />
			<stop offset="100%" stop-color="#f8f0e4" />
		</linearGradient>
		<linearGradient id="orangeBody" x1="0%" x2="100%" y1="0%" y2="100%">
			<stop offset="0%" stop-color="#ff8a25" />
			<stop offset="62%" stop-color="#f26b2d" />
			<stop offset="100%" stop-color="#d95425" />
		</linearGradient>
		<linearGradient id="orangeDark" x1="0%" x2="100%" y1="0%" y2="100%">
			<stop offset="0%" stop-color="#d96538" />
			<stop offset="100%" stop-color="#a83d2b" />
		</linearGradient>
		<pattern id="paperLines" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
			<path d="M0 0h34" fill="none" stroke="#ead8ba" stroke-width="3" opacity="0.22" />
		</pattern>
	</defs>

	<rect width="900" height="520" fill="url(#coverBg)" />
	<rect width="900" height="520" fill="url(#paperLines)" opacity="0.52" />
	<ellipse cx="450" cy="422" rx="148" ry="18" fill="#221915" opacity="0.11" />

	<g transform="translate(450 266) scale(0.72) translate(-450 -286)">
		<g class="robot-bob" filter="url(#softShadow)">
			<g filter="url(#roughInk)">
			<path d="M440 103c8-42 24-66 48-72" fill="none" stroke="#241412" stroke-width="9" stroke-linecap="round" />
			<circle class="antenna-dot" cx="502" cy="27" r="18" fill="#221915" />
			<path d="M525 36h28" fill="none" stroke="#f26b2d" stroke-width="7" stroke-linecap="round" />
			<path d="M392 112l149 6c28 1 44 18 43 47l-5 86c-2 31-21 48-53 46l-153-10c-31-2-47-20-45-51l5-79c2-31 22-47 59-45z" fill="url(#orangeBody)" />
			<rect x="314" y="174" width="31" height="68" rx="8" fill="url(#orangeDark)" />
			<rect x="569" y="183" width="31" height="68" rx="8" fill="url(#orangeDark)" />
			<circle cx="406" cy="189" r="16" fill="#211317" />
			<circle cx="512" cy="196" r="24" fill="#211317" />
			<path d="M415 248c31 13 64 13 99-3" fill="none" stroke="#211317" stroke-width="8" stroke-linecap="round" />
			<path d="M369 124c40-10 124-7 172 8" fill="none" stroke="#fff1dc" stroke-width="8" stroke-linecap="round" opacity="0.68" />
			<path d="M360 296c55 11 135 14 188 6 32 33 44 79 30 138-57 20-165 20-234-1-10-63-5-112 16-143z" fill="url(#orangeBody)" />
			<path d="M393 335c10-26 51-31 68-9 18-22 63-13 67 17 5 34-25 58-67 83-45-29-80-55-68-91z" fill="#fff1dc" opacity="0.32" />
			<circle cx="450" cy="387" r="42" fill="none" stroke="#ffd9b6" stroke-width="17" opacity="0.78" />
			<circle cx="525" cy="348" r="24" fill="none" stroke="#ffd9b6" stroke-width="12" opacity="0.78" />
			<path d="M348 331c-44 11-71 42-82 92" fill="none" stroke="#f26b2d" stroke-width="25" stroke-linecap="round" />
			<path d="M269 423c-24-6-44 4-55 29" fill="none" stroke="#f26b2d" stroke-width="24" stroke-linecap="round" />
			<circle cx="213" cy="453" r="20" fill="none" stroke="#2b1a20" stroke-width="10" />
			<path d="M401 438c-39 26-64 50-76 76" fill="none" stroke="#f26b2d" stroke-width="26" stroke-linecap="round" />
			<path d="M507 440c35 28 54 53 58 74" fill="none" stroke="#f26b2d" stroke-width="26" stroke-linecap="round" />
			<path d="M303 496h73l-26 35h-75zM544 496h75l-32 35h-76z" fill="#2b1a20" opacity="0.76" />
			<path d="M302 489h73l-26 35h-75zM544 489h75l-32 35h-76z" fill="url(#orangeDark)" />

			<g class="robot-wave">
				<path d="M572 323c46-13 73-44 82-93" fill="none" stroke="#f26b2d" stroke-width="25" stroke-linecap="round" />
				<path d="M654 232c17-19 37-25 62-14" fill="none" stroke="#f26b2d" stroke-width="24" stroke-linecap="round" />
				<circle cx="714" cy="219" r="20" fill="none" stroke="#2b1a20" stroke-width="10" />
				<path d="M691 185c29 8 52 24 69 48" fill="none" stroke="#f26b2d" stroke-width="9" stroke-linecap="round" opacity="0.72" />
				<path d="M704 162c32 8 58 27 78 58" fill="none" stroke="#f26b2d" stroke-width="8" stroke-linecap="round" opacity="0.42" />
			</g>
			</g>
	</g>
	</g>
</svg>
