<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
	<title id="title">MySQL 海豚</title>
	<desc id="desc">MySQL 字样上方有一只海豚，海豚轻轻晃动。</desc>
	<style>
		.dolphin {
			animation: dolphin-sway 2.1s ease-in-out infinite;
			transform-box: view-box;
			transform-origin: 560px 178px;
		}

		.water-mark {
			animation: water-drift 2.1s ease-in-out infinite;
			transform-box: fill-box;
			transform-origin: center;
		}

		@keyframes dolphin-sway {
			0%,
			100% {
				transform: translateY(0) rotate(-4deg);
			}

			48% {
				transform: translateY(-12px) rotate(6deg);
			}
		}

		@keyframes water-drift {
			0%,
			100% {
				opacity: 0.18;
				transform: translateX(-10px);
			}

			50% {
				opacity: 0.34;
				transform: translateX(12px);
			}
		}

		@media (prefers-reduced-motion: reduce) {
			.dolphin,
			.water-mark {
				animation: none;
			}
		}
	</style>
	<defs>
		<filter id="roughInk" x="-14%" y="-14%" width="128%" height="128%">
			<feTurbulence type="fractalNoise" baseFrequency="0.024" numOctaves="2" seed="31" result="noise" />
			<feDisplacementMap in="SourceGraphic" in2="noise" scale="0.75" />
		</filter>
		<filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
			<feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#26313a" flood-opacity="0.12" />
		</filter>
		<linearGradient id="coverBg" x1="0%" x2="100%" y1="0%" y2="100%">
			<stop offset="0%" stop-color="#fffdf8" />
			<stop offset="100%" stop-color="#f4f0e8" />
		</linearGradient>
		<pattern id="paperLines" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
			<path d="M0 0h34" fill="none" stroke="#e8dac2" stroke-width="3" opacity="0.2" />
		</pattern>
	</defs>

	<rect width="900" height="520" fill="url(#coverBg)" />
	<rect width="900" height="520" fill="url(#paperLines)" opacity="0.5" />
	<ellipse cx="450" cy="410" rx="286" ry="28" fill="#221915" opacity="0.08" />
	<path class="water-mark" d="M185 366c88-24 172-24 252 0 82 24 170 24 264-1" fill="none" stroke="#5f879a" stroke-width="10" stroke-linecap="round" opacity="0.2" />

	<g filter="url(#softShadow)">
		<text x="184" y="365" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="138" font-weight="500" letter-spacing="-8" fill="#5f879a">My</text>
		<text x="408" y="365" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="138" font-weight="500" letter-spacing="-8" fill="#f49a1e">SQL</text>
		<text x="694" y="351" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#f49a1e">TM</text>
	</g>

	<g class="dolphin" filter="url(#roughInk)">
		<path d="M494 80c42 10 78 43 109 98 10 18 22 29 39 34 29 9 51 26 68 52-31-15-55-19-73-12 16 14 34 29 55 46-33-8-58-24-76-49-20-4-35-8-46-13-24-10-41-33-52-69-11-37-28-62-52-75-20-10-27-25-20-40 18 2 34 11 48 28z" fill="#fffdf8" stroke="#5f879a" stroke-width="10" stroke-linejoin="round" />
		<path d="M497 82c18 33 34 64 48 94" fill="none" stroke="#5f879a" stroke-width="8" stroke-linecap="round" opacity="0.36" />
		<path d="M552 217c-11 32-29 52-54 60 6-28 4-53-7-75" fill="#fffdf8" stroke="#5f879a" stroke-width="9" stroke-linejoin="round" />
		<path d="M605 199c29 9 51 21 67 37" fill="none" stroke="#5f879a" stroke-width="8" stroke-linecap="round" opacity="0.55" />
		<circle cx="548" cy="119" r="6" fill="#5f879a" />
		<path d="M481 73c-18-13-31-19-40-18 5 17 16 30 33 40" fill="#fffdf8" stroke="#5f879a" stroke-width="9" stroke-linejoin="round" />
		<path d="M469 95c19 8 34 21 45 39" fill="none" stroke="#f49a1e" stroke-width="7" stroke-linecap="round" opacity="0.42" />
	</g>
</svg>
